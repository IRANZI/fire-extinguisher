services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: user
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    environment:
      AUTH_DATABASE_URL: postgres://postgres:user@postgres:5432/fems_auth
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4001"

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    env_file: .env
    environment:
      INVENTORY_DATABASE_URL: postgres://postgres:user@postgres:5432/fems_inventory
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4002:4002"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file: .env
    environment:
      NOTIFICATION_DATABASE_URL: postgres://postgres:user@postgres:5432/fems_notification
      INVENTORY_SERVICE_URL: http://inventory-service:4002
    depends_on:
      postgres:
        condition: service_healthy
      inventory-service:
        condition: service_started
    ports:
      - "4003:4003"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth-service:4001
      INVENTORY_SERVICE_URL: http://inventory-service:4002
      NOTIFICATION_SERVICE_URL: http://notification-service:4003
    depends_on:
      - auth-service
      - inventory-service
      - notification-service
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    depends_on:
      - api-gateway
    ports:
      - "5173:80"

volumes:
  postgres-data:
