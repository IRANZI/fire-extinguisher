services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: user
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      AUTH_DATABASE_URL: postgres://postgres:user@postgres:5432/fems_auth
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4001"

  extinguisher-service:
    build:
      context: .
      dockerfile: services/extinguisher-service/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      EXTINGUISHER_DATABASE_URL: postgres://postgres:user@postgres:5432/fems_inventory
      NOTIFICATION_SERVICE_URL: http://notification-service:4003
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4002:4002"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      NOTIFICATION_DATABASE_URL: postgres://postgres:user@postgres:5432/fems_notification
      EXTINGUISHER_SERVICE_URL: http://extinguisher-service:4002
    depends_on:
      postgres:
        condition: service_healthy
      extinguisher-service:
        condition: service_started
    ports:
      - "4003:4003"

  customer-service:
    build:
      context: .
      dockerfile: services/customer-service/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      CUSTOMER_DATABASE_URL: postgres://postgres:user@postgres:5432/fems_inventory
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4004:4004"

  police-alert-service:
    build:
      context: .
      dockerfile: services/police-alert-service/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      POLICE_ALERT_DATABASE_URL: postgres://postgres:user@postgres:5432/fems_inventory
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4005:4005"

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      REPORT_DATABASE_URL: postgres://postgres:user@postgres:5432/fems_inventory
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4006:4006"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      AUTH_SERVICE_URL: http://auth-service:4001
      EXTINGUISHER_SERVICE_URL: http://extinguisher-service:4002
      NOTIFICATION_SERVICE_URL: http://notification-service:4003
      CUSTOMER_SERVICE_URL: http://customer-service:4004
      POLICE_ALERT_SERVICE_URL: http://police-alert-service:4005
      REPORT_SERVICE_URL: http://report-service:4006
    depends_on:
      - auth-service
      - extinguisher-service
      - notification-service
      - customer-service
      - police-alert-service
      - report-service
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    depends_on:
      - api-gateway
    ports:
      - "5173:80"

volumes:
  postgres-data:
